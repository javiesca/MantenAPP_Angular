<div class="register-page">
  <div class="register-card">
    <div class="brand-block">
      <p class="brand-kicker">Nuevo usuario</p>
      <h1 class="brand-title">Crea tu cuenta</h1>
      <p class="brand-subtitle">Empieza a gestionar tus vehiculos en MantenAPP.</p>
    </div>

    <form class="register-form" (ngSubmit)="register()">
      <div class="field-group">
        <label for="userName" class="form-label">Usuario</label>
        <input
          type="text"
          id="userName"
          class="form-control"
          [(ngModel)]="userName"
          name="userName"
          required>
      </div>

      <div class="field-group">
        <label for="email" class="form-label">Correo electronico</label>
        <input
          type="email"
          id="email"
          class="form-control"
          [(ngModel)]="mail"
          name="email"
          required>
      </div>

      <div class="field-group">
        <label for="password" class="form-label">Contrasena</label>
        <input
          type="password"
          id="password"
          class="form-control"
          [(ngModel)]="password"
          name="password"
          required>
      </div>

      <button type="submit" class="btn register-btn w-100 botton-press" appPressEffect>
        Crear cuenta
      </button>

      <div *ngIf="errorMessage" class="alert alert-danger mt-3 mb-0">
        {{ errorMessage }}
      </div>
    </form>

    <div class="register-footer">
      <a routerLink="/login">Ya tienes cuenta? Inicia sesion</a>
    </div>
  </div>
</div>
