<div class="row tabla-principal">

  <div class="loading-home" *ngIf="loading">
    <div class="loading-title">
      <span class="loading-dot"></span>
      Cargando vehiculos y alertas...
    </div>

    <div class="loading-grid">
      <div class="loading-card" *ngFor="let card of loadingCards">
        <div class="loading-line loading-line-lg"></div>
        <div class="loading-line loading-line-sm"></div>
        <div class="loading-line loading-line-sm"></div>
        <div class="loading-block"></div>
        <div class="loading-line loading-line-md"></div>
      </div>
    </div>
  </div>

  <ng-container *ngIf="!loading">
  <div class="col-lg-5" *ngFor="let vehiculo of vehiculos">
    <div
      class="card mb-3 vehicle-card botton-press"
      appPressEffect
      (click)="detallesVehiculo(vehiculo.idVehiculo)"
      style="cursor: pointer;">

      <div class="card-header vehicle-header">
        <div class="vehicle-name">{{vehiculo.marca}} - {{vehiculo.modelo}}</div>

        <div class="alertas-fecha" *ngIf="!loading && alertasPorVehiculo[vehiculo.idVehiculo]?.length">
          <div
            *ngFor="let alerta of alertasPorVehiculo[vehiculo.idVehiculo]"
            class="alerta-item"
            [ngClass]="getClaseAlerta(alerta)">
            <i class="fa fa-exclamation-triangle"></i>
            <span>
              {{ getMensajeAlerta(alerta) }}
              <ng-container *ngIf="alerta.fecha">({{ alerta.fecha | date:'dd/MM/yyyy' }})</ng-container>
            </span>
          </div>
        </div>
      </div>

      <div class="card-body text-center vehicle-body">
        <div class="imagen-vehiculo">
          <ng-container *ngIf="vehiculo.image?.imageUrl && !imgError[vehiculo.idVehiculo]; else noImg">
            <img
              [src]="vehiculo.image?.imageUrl"
              class="imagen-vehiculo"
              alt="Imagen del vehículo"
              (error)="imgError[vehiculo.idVehiculo] = true">
          </ng-container>

          <ng-template #noImg>
            <div class="no-image imagen-vehiculo">
              <i class="fa fa-car"></i>
            </div>
          </ng-template>
        </div>

        <div class="botones">
          <button
            class="btn vehicle-action-btn vehicle-action-edit botton-press"
            appPressEffect
            (click)="guardarVehiculo(vehiculo.idVehiculo); $event.stopPropagation()">
            <i class="fas fa-edit"></i>
            <span>Editar</span>
          </button>

          <button
            class="btn vehicle-action-btn vehicle-action-delete botton-press"
            appPressEffect
            (click)="deleteVehiculo(vehiculo.idVehiculo); $event.stopPropagation()">
            <i class="fas fa-trash-alt"></i>
            <span>Eliminar</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="text-center mt-3 mb-3 vehicle-new-action">
    <button
      class="btn btn-success vehicle-primary-btn botton-press"
      appPressEffect
      [routerLink]="['/guardar-vehiculo']">
      <i class="fas fa-plus"></i>
      Nuevo Vehículo
    </button>
  </div>
  </ng-container>

</div>
