<div class="login-page">
  <div class="login-card">
    <div class="brand-block">
      <p class="brand-kicker">Bienvenido</p>
      <h1 class="brand-title">MantenAPP</h1>
      <p class="brand-subtitle">Accede para gestionar tus vehículos y mantenimientos.</p>
    </div>

    <form class="login-form" (ngSubmit)="login()">
      <div class="field-group">
        <label for="username" class="form-label">Usuario</label>
        <input
          type="text"
          id="username"
          class="form-control"
          [(ngModel)]="userName"
          name="nombreUsuario"
          required>
      </div>

      <div class="field-group">
        <label for="password" class="form-label">Contraseña</label>
        <input
          type="password"
          id="password"
          class="form-control"
          [(ngModel)]="password"
          name="password"
          required>
      </div>

      <button
        type="submit"
        class="btn login-btn w-100 d-flex justify-content-center align-items-center botton-press"
        appPressEffect
        [disabled]="isLoading">
        <span *ngIf="!isLoading">Entrar</span>
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
        <span *ngIf="isLoading" class="ms-2">Conectando...</span>
      </button>
    </form>

    <div class="login-footer">
      <a routerLink="/register">No tienes cuenta? Regístrate</a>
    </div>

    <div *ngIf="successMessage" class="alert alert-success mt-3">
      {{ successMessage }}
    </div>
    <div *ngIf="incorrectCredentials" class="alert alert-danger mt-3 mb-0">
      Las credenciales proporcionadas son incorrectas. Por favor, inténtalo de nuevo.
    </div>
  </div>
</div>
