<nav *ngIf="authService.isLoggedIn()" class="navbar app-navbar px-3">
  <div class="app-navbar-user">
    <div class="app-navbar-avatar">
      {{ authService.getUsername()?.charAt(0)?.toUpperCase() }}
    </div>
    <div class="app-navbar-usertext">
      <span class="app-navbar-label">Sesión activa</span>
      <span class="app-navbar-name text-truncate">{{ authService.getUsername() }}</span>
    </div>
  </div>

  <div class="ms-auto d-flex gap-2">
    <!--
    <button (click)="dispararNotificaciones()" class="btn btn-warning">
      <i class="fa fa-bell"></i>
    </button>
    -->
    <button (click)="logout()" class="btn app-logout-btn">
      <i class="fa fa-sign-out-alt"></i>
      <span>Salir</span>
    </button>
  </div>

</nav>

<div [class.container]="authService.isLoggedIn()" [class.text-center]="authService.isLoggedIn()">
  <router-outlet></router-outlet>
</div>
